<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>건강급식 컬링 🚚 | 전주서일초</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#CDE8F8; --panel:#FFFFFF; --ink:#2B3A55; --ink-soft:#5A6B85;
  --ring-blue:#7DD1F7; --ring-blue-deep:#39B4EE;
  --orange:#F7A325; --warn:#FFC53D; --warn-deep:#E8A400;
  --safe:#6BA84F; --safe-deep:#4F8A36;
  --pink:#F27E9B;
  --t1:#E45B5B; --t2:#4A8FDD; --t3:#57A85A; --t4:#9A67C6;
  --radius:18px;
  --shadow:0 6px 18px rgba(43,58,85,.12);
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  font-family:'Gowun Dodum','Noto Sans KR',sans-serif;
  background:var(--bg);
  background-image:radial-gradient(circle at 12% 18%, rgba(255,255,255,.55) 0 42px, transparent 43px),
                   radial-gradient(circle at 88% 72%, rgba(255,255,255,.45) 0 60px, transparent 61px);
  color:var(--ink);
  min-height:100%;
  overscroll-behavior:none;
  -webkit-tap-highlight-color:transparent;
}
h1,h2,h3,.jua{font-family:'Jua','Gowun Dodum',sans-serif; font-weight:400;}

/* ── 헤더 ─────────────────────────── */
header{
  display:flex; align-items:center; gap:14px; flex-wrap:wrap;
  padding:14px 22px; max-width:1280px; margin:0 auto;
}
header .logo{font-size:30px; letter-spacing:1px; display:flex; align-items:center; gap:10px;}
header .logo .truck{display:inline-block; animation:drive 3.2s ease-in-out infinite;}
@keyframes drive{0%,100%{transform:translateX(0)}50%{transform:translateX(8px)}}
header .sub{font-size:13px; color:var(--ink-soft);}
header .spacer{flex:1;}
.btn{
  font-family:'Jua',sans-serif; font-size:15px; border:none; cursor:pointer;
  padding:9px 16px; border-radius:999px; color:#fff; background:var(--ink);
  box-shadow:0 3px 0 rgba(0,0,0,.15); transition:transform .08s;
}
.btn:hover{transform:translateY(-1px);}
.btn:active{transform:translateY(1px);}
.btn.ghost{background:#fff; color:var(--ink); border:2px solid var(--ink);}
.btn.orange{background:var(--orange);}
.btn.pink{background:var(--pink);}
.btn.green{background:var(--safe);}
.btn.big{font-size:19px; padding:13px 30px;}
.btn:disabled{opacity:.4; cursor:not-allowed;}
.btn:focus-visible,button:focus-visible,input:focus-visible{outline:3px solid var(--ring-blue-deep); outline-offset:2px;}

/* ── 레이아웃 ─────────────────────── */
main{
  max-width:1280px; margin:0 auto 40px; padding:0 18px;
  display:grid; grid-template-columns:minmax(360px, 560px) 1fr; gap:20px; align-items:start;
}
@media (max-width:980px){ main{grid-template-columns:1fr;} }

.board-wrap{
  background:var(--panel); border-radius:var(--radius); box-shadow:var(--shadow);
  padding:12px; position:relative;
}
canvas#board{width:100%; height:auto; display:block; border-radius:12px; touch-action:none; cursor:crosshair;}
.hint{
  text-align:center; font-size:13px; color:var(--ink-soft); padding:8px 4px 2px;
}
.hint b{color:var(--ink);}

/* ── 팀 패널 ─────────────────────── */
.side{display:flex; flex-direction:column; gap:14px;}
.turn-banner{
  background:var(--panel); border-radius:var(--radius); box-shadow:var(--shadow);
  padding:12px 18px; display:flex; align-items:center; gap:12px; flex-wrap:wrap;
}
.turn-banner .who{font-family:'Jua'; font-size:22px;}
.turn-banner .end-info{margin-left:auto; font-size:13px; color:var(--ink-soft);}
.teams{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
@media (max-width:560px){ .teams{grid-template-columns:1fr;} }
.team-card{
  background:var(--panel); border-radius:var(--radius); box-shadow:var(--shadow);
  padding:12px 14px; border:3px solid transparent; transition:border-color .2s, transform .2s;
  position:relative; overflow:hidden;
}
.team-card.active{border-color:var(--tc); transform:translateY(-2px);}
.team-card.done::after{
  content:'식판 완성! 🎉'; position:absolute; top:10px; right:-34px; transform:rotate(35deg);
  background:var(--pink); color:#fff; font-family:'Jua'; font-size:12px; padding:3px 38px;
}
.team-head{display:flex; align-items:center; gap:8px;}
.team-dot{width:16px; height:16px; border-radius:50%; background:var(--tc); flex:none;}
.team-name{font-family:'Jua'; font-size:18px;}
.team-mile{margin-left:auto; font-size:13px; color:var(--ink-soft);}
.team-mile b{font-family:'Jua'; font-size:18px; color:var(--tc);}
.stones{display:flex; gap:3px; margin:6px 0 8px; font-size:15px;}
.stones .used{opacity:.18; filter:grayscale(1);}
.tray{
  display:grid; gap:6px; padding:10px; border-radius:20px;
  background:linear-gradient(155deg,#E2E9F0,#B9C6D3);
  border:3px solid #93A2B3;
  box-shadow:inset 0 3px 9px rgba(43,58,85,.2), 0 2px 3px rgba(0,0,0,.06);
  grid-template-columns:repeat(4,1fr);
  grid-template-rows:1fr .9fr;
  grid-template-areas:
    "namul kimchi dess prot"
    "rice  rice  soup soup";
}
.slot{
  background:#fff; border:2px solid #C3CEDA; border-radius:10px;
  min-height:46px; display:flex; flex-direction:column; align-items:center; justify-content:center;
  font-size:10px; color:#8CA0B8; text-align:center; padding:2px; line-height:1.25;
  box-shadow:inset 0 2px 5px rgba(43,58,85,.12);
}
.slot[data-slot="rice"]{grid-area:rice;}
.slot[data-slot="soup"]{grid-area:soup;}
.slot[data-slot="namul"]{grid-area:namul;}
.slot[data-slot="prot"]{grid-area:prot;}
.slot[data-slot="kimchi"]{grid-area:kimchi;}
.slot[data-slot="dess"]{grid-area:dess;}
.slot .em{font-size:17px; line-height:1;}
.slot.filled{border-style:solid; border-color:var(--tc); background:#FDFEFF; color:var(--ink); box-shadow:inset 0 2px 5px rgba(43,58,85,.06), 0 0 0 2px var(--tc) inset;}
.slot.filled .mile-tag{font-size:9px; color:var(--ink-soft);}

/* ── 모달 ─────────────────────────── */
.overlay{
  position:fixed; inset:0; background:rgba(43,58,85,.45); backdrop-filter:blur(2px);
  display:flex; align-items:center; justify-content:center; z-index:50; padding:16px;
}
.overlay.hidden{display:none;}
.modal{
  background:#fff; border-radius:22px; padding:26px 28px; max-width:640px; width:100%;
  max-height:88vh; overflow:auto; box-shadow:0 18px 50px rgba(0,0,0,.25);
  animation:pop .22s ease-out;
}
@keyframes pop{from{transform:scale(.92); opacity:0}to{transform:scale(1); opacity:1}}
@media (prefers-reduced-motion:reduce){ *{animation:none !important; transition:none !important;} }
.modal .eyebrow{
  display:inline-block; font-family:'Jua'; font-size:13px; color:#fff; background:var(--ring-blue-deep);
  border-radius:999px; padding:4px 14px; margin-bottom:10px;
}
.modal .eyebrow.mission{background:var(--orange);}
.modal .eyebrow.eco{background:var(--safe);}
.modal .eyebrow.warn{background:var(--warn-deep);}
.modal h2{font-size:26px; line-height:1.35; margin-bottom:14px;}
.modal p{line-height:1.7; margin-bottom:10px;}
.opts{display:flex; flex-direction:column; gap:10px; margin-top:14px;}
.opt-btn{
  font-family:'Gowun Dodum'; font-size:17px; text-align:left; padding:13px 18px;
  border-radius:14px; border:2px solid #D6E2EE; background:#F7FAFD; cursor:pointer; transition:.12s;
}
.opt-btn:hover{border-color:var(--ring-blue-deep); background:#EAF6FD;}
.opt-btn.correct{border-color:var(--safe); background:#EAF6E7;}
.opt-btn.wrong{border-color:var(--t1); background:#FDECEC;}
.modal .actions{display:flex; gap:10px; justify-content:center; margin-top:18px; flex-wrap:wrap;}
.big-emoji{font-size:56px; text-align:center; margin:6px 0 10px;}

/* 카드 선택 */
.card-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(118px,1fr)); gap:9px; margin-top:6px;}
.cat-title{
  grid-column:1/-1; font-family:'Jua'; font-size:15px; margin-top:8px;
  color:var(--ink); display:flex; align-items:center; gap:8px;
}
.cat-title::after{content:''; flex:1; height:2px; background:#E5EDF5; border-radius:2px;}
.food-card{
  position:relative; border:2px solid #D6E2EE; border-radius:14px; background:#FFFDF6; padding:10px 8px;
  display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; transition:.12s;
}
.food-card:hover{border-color:var(--orange); transform:translateY(-2px); box-shadow:0 5px 12px rgba(0,0,0,.08);}
.food-card .em, .reveal-card .em{
  display:flex; align-items:center; justify-content:center; border-radius:50%;
  background:radial-gradient(circle at 32% 26%, #ffffff, var(--tint,#F3F6FA) 55%, rgba(43,58,85,.08) 100%);
  box-shadow:0 3px 7px rgba(43,58,85,.16), inset 0 -4px 7px rgba(43,58,85,.08), inset 0 2px 3px rgba(255,255,255,.9);
}
.food-card .em{width:58px; height:58px; font-size:30px;}
.food-card .nm{font-size:13px; text-align:center; line-height:1.3;}
.food-card .og{font-size:10px; color:#8CA0B8; text-align:center; line-height:1.2;}
.food-card.disabled{opacity:.32; pointer-events:none; filter:grayscale(.6);}
.food-card .taken-badge{
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-family:'Jua'; font-size:12px; color:#fff; background:rgba(43,58,85,.55); border-radius:12px;
}
.reveal-card{
  margin:10px auto; width:230px; border:3px solid var(--orange); border-radius:18px;
  background:#FFF8E8; padding:14px 14px 16px; text-align:center;
}
.reveal-card .gr-tag{
  display:inline-block; font-family:'Jua'; font-size:12px; color:#7A5200;
  background:#FFF0BF; border-radius:999px; padding:3px 12px; margin-bottom:4px;
}
.reveal-card .gr-tag.g4,.reveal-card .gr-tag.g5{background:#FDE0D6; color:#9C3B1E;}
.reveal-card .em{width:88px; height:88px; font-size:48px; margin:0 auto 6px;}
.reveal-card .nm{font-family:'Jua'; font-size:21px; margin:4px 0 8px;}
.reveal-card table.card-info{width:100%; border-collapse:collapse; font-size:12.5px;}
.reveal-card table.card-info th{
  font-family:'Jua'; font-weight:400; color:var(--ink-soft); background:#FDF2D9;
  border:1.5px solid #F2DFAE; border-radius:6px; padding:4px 6px; width:44%;
}
.reveal-card table.card-info td{border:1.5px solid #F2DFAE; padding:4px 6px; background:#fff;}

/* 설정 화면 */
.setup-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:16px 0;}
@media (max-width:520px){.setup-grid{grid-template-columns:1fr;}}
.setup-team{display:flex; align-items:center; gap:8px; background:#F5F9FC; border-radius:12px; padding:10px;}
.setup-team input{
  flex:1; min-width:0; font-family:'Jua'; font-size:16px; border:2px solid #D6E2EE; border-radius:10px;
  padding:8px 10px; background:#fff; color:var(--ink);
}

/* 결과표 */
table.result{width:100%; border-collapse:collapse; margin-top:10px; font-size:14px;}
table.result th, table.result td{padding:8px 6px; text-align:center; border-bottom:1.5px solid #E5EDF5;}
table.result th{font-family:'Jua'; font-weight:400; background:#F2F8FC;}
table.result tr.win{background:#FFF6DF;}
table.result .total{font-family:'Jua'; font-size:18px;}
.winner-line{font-family:'Jua'; font-size:24px; text-align:center; margin:12px 0 4px;}

/* 토스트 */
#toast{
  position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px);
  background:var(--ink); color:#fff; font-family:'Jua'; font-size:16px;
  padding:11px 24px; border-radius:999px; opacity:0; pointer-events:none;
  transition:.25s; z-index:80; max-width:90vw; text-align:center;
}
#toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

/* 폭죽 */
.confetti{position:fixed; top:-14px; width:10px; height:14px; z-index:90; pointer-events:none;
  animation:fall linear forwards;}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg); opacity:.2;}}

/* 모바일 최적화 */
@media (max-width:620px){
  header{padding:10px 12px; gap:8px;}
  header .logo{font-size:22px;}
  header .sub{display:none;}
  .btn{font-size:13px; padding:7px 12px;}
  main{padding:0 10px; gap:12px;}
  .board-wrap{padding:8px;}
  .hint{font-size:11px;}
  .turn-banner{padding:9px 12px; position:sticky; top:6px; z-index:10;}
  .turn-banner .who{font-size:18px;}
  .modal{padding:18px 16px; border-radius:16px;}
  .modal h2{font-size:20px;}
  .opt-btn{font-size:15px; padding:11px 14px;}
  .card-grid{grid-template-columns:repeat(auto-fill,minmax(96px,1fr)); gap:7px;}
  .food-card .em{font-size:24px;} .food-card .nm{font-size:11px;}
  table.result{font-size:12px;} table.result th,table.result td{padding:6px 3px;}
  .btn.big{font-size:16px; padding:11px 20px;}
}

.rules h3{margin:14px 0 6px; font-size:18px; color:var(--ring-blue-deep);}
.rules ul{padding-left:20px; line-height:1.8; font-size:15px;}
footer{text-align:center; font-family:'Jua'; color:var(--ink-soft); padding:10px 0 26px; letter-spacing:2px;}
</style>
</head>
<body>

<header>
  <div class="logo jua"><span class="truck">🚚</span>건강급식 컬링</div>
  <div class="sub">전주서일초 · 저탄소 환경급식 × 영양·식생활교육</div>
  <div class="spacer"></div>
  <button class="btn ghost" id="btnRules">❓ 게임 방법</button>
  <button class="btn orange" id="btnRestart">🔄 다시 시작</button>
  <button class="btn" id="btnFinish">🏁 게임 종료·점수 계산</button>
</header>

<main>
  <div class="board-wrap">
    <canvas id="board" width="620" height="940"></canvas>
    <div class="hint">🖱️ 트럭을 <b>누른 채 아래로 당겼다 놓으면</b> 발사! 멀리 당길수록 세게 나가요.</div>
  </div>

  <div class="side">
    <div class="turn-banner">
      <span style="font-size:26px" id="turnTruck">🚚</span>
      <span class="who" id="turnWho">-</span>
      <span id="turnMsg" style="font-size:14px;color:var(--ink-soft)">트럭을 발사하세요!</span>
      <span class="end-info" id="endInfo">1엔드</span>
    </div>
    <div class="teams" id="teams"></div>
  </div>
</main>

<footer>siwon socool</footer>

<div class="overlay hidden" id="overlay">
  <div class="modal" id="modalBox"></div>
</div>
<div id="toast"></div>

<script>

function beep(f,d,type='sine',v=.12){
  try{
    if(!audioCtx) return;
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type=type; o.frequency.value=f; g.gain.value=v;
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); g.gain.exponentialRampToValueAtTime(.0001, audioCtx.currentTime+d);
    o.stop(audioCtx.currentTime+d);
  }catch(e){}
}
function toast(msg,ms=2200){
  const t=$('#toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._tm); t._tm=setTimeout(()=>t.classList.remove('show'),ms);
}
function confetti(){
  const colors=['#F7A325','#7DD1F7','#F27E9B','#57A85A','#E45B5B','#9A67C6'];
  for(let i=0;i<70;i++){
    const c=document.createElement('div'); c.className='confetti';
    c.style.left=Math.random()*100+'vw';
    c.style.background=colors[i%colors.length];
    c.style.animationDuration=(2.2+Math.random()*1.8)+'s';
    c.style.animationDelay=(Math.random()*.5)+'s';
    c.style.borderRadius=Math.random()>.5?'50%':'3px';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),4500);
  }
}

function drawTruck(s){
  ctx.save(); ctx.translate(s.x,s.y); ctx.rotate(s.ang);
  const c=teams[s.team].color;
  // 바퀴
  ctx.fillStyle='#33404F';
  ctx.beginPath(); ctx.arc(-8,10,4.5,0,7); ctx.arc(8,10,4.5,0,7); ctx.fill();
  // 짐칸
  ctx.fillStyle=c; ctx.strokeStyle='#fff'; ctx.lineWidth=2;
  roundRect(-15,-10,20,19,3); ctx.fill(); ctx.stroke();
  // 운전석
  ctx.fillStyle='#FDFDFD';
  roundRect(5,-6,11,15,3); ctx.fill(); ctx.strokeStyle=c; ctx.stroke();
  ctx.fillStyle='#AEE2F8'; roundRect(8,-4,6,6,2); ctx.fill();
  // 팀 번호
  ctx.fillStyle='#fff'; ctx.font='bold 11px sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(String(s.team+1), -5, 0);
  ctx.restore();
}
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

  txt('💪 스쿼트 10개!', 505, 165, 15, '#2B3A55');
  txt('🦵 런지 10개!', 105, 668, 15, '#2B3A55');
  txt('🫑 색깔 채소 말하기!', 508, 668, 15, '#2B3A55');
  // 스타트 구역
  ctx.fillStyle='#E8F4FC'; ctx.fillRect(WALL_L,SAFE_B,WALL_R-WALL_L,H-20-SAFE_B);
  ctx.setLineDash([8,6]); ctx.strokeStyle='#9BC5DF';
  ctx.strokeRect(WALL_L,SAFE_B,WALL_R-WALL_L,H-20-SAFE_B); ctx.setLineDash([]);
  txt('S T A R T', CX, SAFE_B+30, 26, '#4A90D9');
  // 테두리
  ctx.strokeStyle='#2B3A55'; ctx.lineWidth=3;
  ctx.strokeRect(WALL_L,WARN_T,WALL_R-WALL_L,H-20-WARN_T);

  // 조준선
  if(aim && curStone){
    const dx=curStone.x-aim.cx, dy=curStone.y-aim.cy;
    const pw=Math.min(Math.hypot(dx,dy),220);
    const a=Math.atan2(dy,dx);
    ctx.save();
    ctx.strokeStyle=teams[curStone.team].color; ctx.lineWidth=4; ctx.setLineDash([10,8]);
    ctx.beginPath(); ctx.moveTo(curStone.x,curStone.y);
    ctx.lineTo(curStone.x+Math.cos(a)*pw*1.6, curStone.y+Math.sin(a)*pw*1.6); ctx.stroke();
    ctx.setLineDash([]);
    // 파워 게이지
    ctx.fillStyle='#fff'; ctx.strokeStyle='#2B3A55'; ctx.lineWidth=2;
    roundRect(WALL_R-150,H-52,130,18,9); ctx.fill(); ctx.stroke();
    ctx.fillStyle=pw>170?'#E45B5B':pw>90?'#F7A325':'#57A85A';
    roundRect(WALL_R-148,H-50,126*(pw/220),14,7); ctx.fill();
    txt('파워', WALL_R-172, H-43, 14, '#2B3A55');
    ctx.restore();
  }
  // 스톤들
  stones.forEach(s=>{ if(!s.out) drawTruck(s); });
  // 대기 스톤 강조
  if(phase==='aim' && curStone){
    ctx.strokeStyle=teams[curStone.team].color; ctx.lineWidth=3;
    ctx.setLineDash([5,5]);
    ctx.beginPath(); ctx.arc(curStone.x,curStone.y,STONE_R+7+Math.sin(Date.now()/250)*2,0,7);
    ctx.stroke(); ctx.setLineDash([]);
  }
}
function txt(t,x,y,size,color){
  ctx.fillStyle=color; ctx.font=`${size}px 'Jua', sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(t,x,y);
}

/* ══════════════════ 물리 ══════════════════ */
function physicsStep(){
  const SUB=3;
  for(let k=0;k<SUB;k++){
    stones.forEach(s=>{
      if(s.out) return;
      s.x+=s.vx/SUB; s.y+=s.vy/SUB;
      const sp=Math.hypot(s.vx,s.vy);
      if(sp>0.02){ s.ang=Math.atan2(s.vy,s.vx); s.vx*=0.996; s.vy*=0.996; }
      else { s.vx=0; s.vy=0; }
      // 아웃 판정 (좌/우/위)
      if(s.x<WALL_L-STONE_R||s.x>WALL_R+STONE_R||s.y<WARN_T-STONE_R){
        s.out=true; s.vx=0; s.vy=0;
        toast(`${teams[s.team].name} 트럭이 밖으로 나갔어요! 🚧`);
      }
      // 아래쪽 벽은 살짝 튕김
      if(s.y>H-20-STONE_R){ s.y=H-20-STONE_R; s.vy*=-0.4; }
    });
    // 충돌
    for(let i=0;i<stones.length;i++)for(let j=i+1;j<stones.length;j++){
      const a=stones[i],b=stones[j];
      if(a.out||b.out) continue;
      const dx=b.x-a.x, dy=b.y-a.y, d=Math.hypot(dx,dy);
      if(d>0 && d<STONE_R*2){
        const nx=dx/d, ny=dy/d, overlap=STONE_R*2-d;
        a.x-=nx*overlap/2; a.y-=ny*overlap/2;
        b.x+=nx*overlap/2; b.y+=ny*overlap/2;
        const va=a.vx*nx+a.vy*ny, vb=b.vx*nx+b.vy*ny;
        const dv=va-vb;
        if(dv>0){
          a.vx-=dv*nx; a.vy-=dv*ny;
          b.vx+=dv*nx; b.vy+=dv*ny;
          if(dv>1.5) beep(180+Math.random()*60,.06,'square',.1);
        }
      }
    }
  }
}
function allStopped(){return stones.every(s=>s.out||(s.vx===0&&s.vy===0));}

function loop(){
  if(phase==='moving'){
    physicsStep();
    if(allStopped()){ phase='event'; setTimeout(resolveThrow,350); }
  }
  drawBoard();
  requestAnimationFrame(loop);
}

/* ══════════════════ 입력 ══════════════════ */
function pt(ev){
  const r=canvas.getBoundingClientRect();
  return {x:(ev.clientX-r.left)*W/r.width, y:(ev.clientY-r.top)*H/r.height};
}
canvas.addEventListener('pointerdown',ev=>{
  if(!audioCtx){try{audioCtx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  if(phase!=='aim'||!curStone) return;
  const p=pt(ev);
  if(Math.hypot(p.x-curStone.x,p.y-curStone.y)<70){
    aim={cx:p.x,cy:p.y}; canvas.setPointerCapture(ev.pointerId);
  }
});
canvas.addEventListener('pointermove',ev=>{
  if(aim){const p=pt(ev); aim.cx=p.x; aim.cy=p.y;}
});
canvas.addEventListener('pointerup',ev=>{
  if(!aim||!curStone) return;
  const dx=curStone.x-aim.cx, dy=curStone.y-aim.cy;
  const pw=Math.min(Math.hypot(dx,dy),220);
  aim=null;
  if(pw<15){toast('조금 더 세게 당겨보세요!'); return;}
  const a=Math.atan2(dy,dx), sp=pw*0.105;
  curStone.vx=Math.cos(a)*sp; curStone.vy=Math.sin(a)*sp; curStone.thrown=true;
  teams[curIdx].stonesLeft--; renderTeams();
  phase='moving'; $('#turnMsg').textContent='트럭 출발! 🚚💨';
  beep(320,.12,'triangle',.14);
});

/* ══════════════════ 구역 판정 & 이벤트 ══════════════════ */
function zoneOf(s){
  if(s.out) return 'out';
  if(s.y<=WARN_B) return 'warn';
  if(s.y>HOUSE_B && s.y<=SAFE_B) return 'safe';
  if(s.y>SAFE_B) return 'start';
  const d=Math.hypot(s.x-CX,s.y-CY);
  if(d<=R_CENTER) return 'center';
  if(d<=R_INNER) return 'quizE';   // 흰색 안쪽 링: 저탄소·환경 퀴즈
  if(d<=R_BLUE) return 'quizH';    // 파란 링: 건강 식생활 퀴즈
  if(s.x<CX && s.y<CY) return 'rps';
  if(s.x>=CX && s.y<CY) return 'squat';
  if(s.x<CX) return 'lunge';
  return 'veggie';
}
function resolveThrow(){
  const t=teams[curIdx], z=zoneOf(curStone);
  switch(z){
    case 'out': toast('아웃! 카드를 얻지 못했어요 😢'); endTurn(); break;
    case 'start': toast('너무 약했어요! 스타트 구역에 머물러서 카드가 없어요.'); endTurn(); break;
    case 'warn':
      openModal(`<span class="eyebrow warn">경고 구역</span>
        <h2>⚠️ 푸드마일리지 경고 구역!</h2>

        다음 트럭으로 밀어내는 것도 작전이에요. 🚚</p>
        <div class="actions"><button class="btn" onclick="closeModal();endTurn()">확인</button></div>`);
      break;
    case 'safe':
      openModal(`<span class="eyebrow eco">안심 구역</span>
        <h2>🌱 푸드마일리지 안심 구역!</h2>
        <p>카드는 없지만, 게임이 끝날 때 트럭이 이곳에 남아 있으면, 마일리지가 동점인 팀끼리 순위를 가릴 때 <b>−1점</b>! 점수가 줄어드는 행운의 자리예요.</p>
        <div class="actions"><button class="btn green" onclick="closeModal();endTurn()">확인</button></div>`);
      break;
    case 'center':
      openCardPicker(`🎯 중앙 명중! <b>${t.name}</b>, 원하는 음식 카드를 골라요!`);
      break;
    case 'quizH': openQuiz('H'); break;
    case 'quizE': openQuiz('E'); break;
    default: openMission(z);
  }
}

/* ══════════════════ 턴 진행 ══════════════════ */
function endTurn(){
  if(phase==='finished') return;
  if(teams.every(t=>t.done)){ finishGame(); return; }
  // 다음 팀: 완성 안 했고 스톤이 남은 팀
  let found=-1;
  for(let k=1;k<=4;k++){
    const i=(curIdx+k)%4;
    if(!teams[i].done && teams[i].stonesLeft>0){ found=i; break; }
  }
  if(found===-1){
    // 엔드 종료
    openModal(`
      <span class="eyebrow">엔드 종료</span>
      <h2>🥌 ${endNo}엔드가 끝났어요!</h2>
      <p>아직 식판을 완성하지 못한 팀이 있어요. 다음 엔드를 시작하면 보드의 트럭이 모두 치워지고
      각 팀은 새 트럭 ${STONES_PER_END}대를 받아요.</p>
      <p style="font-size:13px;color:var(--ink-soft)">※ 경고/안심 구역 점수는 <b>게임을 종료하는 순간</b>의 보드로만 계산돼요.</p>
      <div class="actions">
        <button class="btn orange big" onclick="nextEnd()">▶️ 다음 엔드 시작</button>
        <button class="btn big" onclick="closeModal();finishGame()">🏁 여기서 게임 종료</button>
      </div>`);
    return;
  }
  curIdx=found; phase='aim'; spawnStone(); updateTurnUI();
  $('#turnMsg').textContent='트럭을 발사하세요!';
}
window.nextEnd=function(){
  endNo++; stones=[];
  teams.forEach(t=>{ if(!t.done) t.stonesLeft=STONES_PER_END; });
  // 다음 미완성 팀부터
  curIdx=teams.findIndex(t=>!t.done);
  closeModal(); spawnStone(); phase='aim'; updateTurnUI();
  toast(`${endNo}엔드 시작! 🚚`);
};

/* ══════════════════ 게임 종료 & 점수 ══════════════════ */
function finishGame(){
  phase='finished'; aim=null;
  const rows=teams.map(t=>{
    const mile=trayMileage(t);
    const emptyN=SLOTS.filter(s=>!t.tray[s.id]).length;
    let warnN=0,safeN=0;
    stones.forEach(s=>{
      if(s.out||s.team!==t.idx) return;
      const z=zoneOf(s);
      if(z==='warn') warnN++; if(z==='safe') safeN++;
    });
    const zone=warnN*1-safeN*1;
    const base=mile+emptyN;
    return {t, mile, emptyN, warnN, safeN, zone, base, grade:trayGrades(t)};
  });
  // 마일리지+미완성 패널티(base)가 같은 팀끼리만 구역 점수를 더해 동점을 가려요.
  rows.forEach(r=>{ r.tied = rows.some(x=>x!==r && x.base===r.base); r.final = r.tied ? r.base+r.zone : r.base; });
  rows.sort((a,b)=>a.base-b.base || a.zone-b.zone || a.grade-b.grade);
  const win=rows[0];
  confetti();
  openModal(`
    <span class="eyebrow eco">최종 결과</span>
    <div class="winner-line">🏆 우승: <span style="color:${win.t.color}">${win.t.name}</span> (최종 ${win.final}점)</div>
    <p style="text-align:center;font-size:14px;color:var(--ink-soft)">푸드마일리지가 <b>가장 낮은</b> 팀이 승리! 가까운 곳 음식이 지구를 지켜요 🌍</p>
    <table class="result">
      <tr><th>순위</th><th>팀</th><th>카드<br>마일리지</th><th>미완성<br>칸(+1)</th><th>⚠️경고<br>(+1)</th><th>🌱안심<br>(−1)</th><th>최종점수</th></tr>
      ${rows.map((r,i)=>`
        <tr class="${i===0?'win':''}">
          <td>${['🥇','🥈','🥉','4위'][i]}</td>
          <td style="color:${r.t.color};font-family:'Jua'">${r.t.name}${r.t.done?'':' <small>(미완성)</small>'}</td>
          <td>${r.mile}</td>
          <td>${r.emptyN?'+'+r.emptyN:'0'}</td>
          <td>${r.warnN?'+'+r.warnN:'0'}</td><td>${r.safeN?'−'+r.safeN:'0'}</td>
          <td class="total">${r.final}</td>
        </tr>`).join('')}
    </table>
    <p style="font-size:12px;color:var(--ink-soft);margin-top:8px">※ 완성 순서는 점수에 영향을 주지 않지만, 채우지 못한 칸은 하나당 <b>+1점</b>이 더해져요. 이 점수까지 같은 팀은 경고(+1)·안심(−1) 구역 트럭 개수를 더해 순위를 가리고, 그래도 같으면 음식 건강등급 합이 낮은(더 건강한) 팀이 이겨요.</p>
    <div class="actions">
      <button class="btn pink big" onclick="restartKeepNames()">🔄 한 판 더!</button>
    </div>`);
  updateTurnUI(); $('#turnWho').textContent='게임 종료'; $('#turnMsg').textContent='';
}
window.restartKeepNames=function(){ showSetup(teams.map(t=>t.name)); };

/* ══════════════════ 모달/규칙 ══════════════════ */
function openModal(html){ $('#modalBox').innerHTML=html; $('#overlay').classList.remove('hidden'); }
window.closeModal=function(){ $('#overlay').classList.add('hidden'); };

      <ul>

        <li>그 점수가 <b>동점</b>이면, 경고 구역 트럭 <b>+1점</b> · 안심 구역 트럭 <b>−1점</b>을 더해 순위를 가려요.</li>
        <li>그래도 동점이면 음식 <b>건강등급 합</b>이 낮은(더 건강한) 팀 승리!</li>

    <div class="actions">

};
window.showSetupBack=function(){ showSetup(teams.length?teams.map(t=>t.name):null); };

$('#btnRules').addEventListener('click',()=>showRules(phase==='setup'));
$('#btnRestart').addEventListener('click',()=>{
  if(phase==='setup'||confirm('게임을 처음부터 다시 시작할까요?')) showSetup(teams.length?teams.map(t=>t.name):null);
});
$('#btnFinish').addEventListener('click',()=>{
  if(phase==='setup'){toast('먼저 게임을 시작해 주세요!');return;}
  if(phase==='finished') return;
  if(confirm('지금 게임을 종료하고 점수를 계산할까요?')) finishGame();
});

/* ══════════════════ 시작 ══════════════════ */
renderTeams(); updateTurnUI(); loop();
if(document.fonts && document.fonts.ready){ document.fonts.ready.then(()=>drawBoard()); }
showSetup();
</script>
